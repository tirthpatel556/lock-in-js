<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>Task Manager</h1>
        <div class="input-group">

            <input type="text" id="taskInput">
            <button id="addTask">Add</button>
        </div>

        <div id="filters">

            <label>
                <input type="radio" name="filter" value="all" checked>All</input>
            </label>
            <label>
                <input type="radio" name="filter" value="completed" checked>Completed</input>
            </label>
            <label>
                <input type="radio" name="filter" value="pending" checked>Pending</input>
            </label>
        </div>

        <p id="emptyState">No tasks yet</p>

        <ul id="taskList"></ul>
        <p id="taskCount"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
